# ----------------------------------------------------------------------------
# AUTHORSHIP
# ----------------------------------------------------------------------------
authorship:
  origin: "ai_proposed"
  human_oversight: "review_required"

  ai_authority:
    can_create: false
    can_modify:
      - "implementation"
      - "verification"
    requires_approval:
      - "intent.goal"
      - "intent.success_metric"
      - "constraints"

  escalation: "Any change to the constraints or to the THCP-to-metric mapping requires human sign-off, because these encode the falsifiable predictions the product is staked on"

# ----------------------------------------------------------------------------
# INVERSION OPPORTUNITIES
# ----------------------------------------------------------------------------
inversion_opportunities:
  problem: "AI agents have no visibility into the structural health of a conversation — they cannot perceive time (drift, convergence, degradation, human memory decay, circadian cognitive load, temporal desynchronization), space (distance from human intent, ontological gap width, conversation geodesics, physical location constraints, device context), pace (conversation velocity and acceleration), or causality (which prior turns are still reachable, light cone collapse) during multi-turn interactions. Three independent no-go theorems prove this blindness is structural, not an engineering limitation."
  dominant_belief: "Improve conversation quality by making the model smarter — larger context windows, better RLHF, Constitutional AI. Conversation quality is a model property."
  proposed_inversions:
    - name: "Quality is not a model property — it is a conversation property"
      description: "Instead of embedding quality into the model at training time, measure it externally at runtime as a dynamic system with its own trajectory, health status, and physics."
      rationale: "OpenAI's alignment midtraining (April 2026) showed training-time alignment does not generalize to multi-turn chat. MSR/Salesforce showed 39% degradation from turn boundaries alone, not context length. Quality emerges from the interaction, not the model."
      status: "chosen"

    - name: "Don't evaluate content — evaluate dynamics"
      description: "Every existing tool evaluates what the agent said (content quality). Invert: evaluate how the conversation is evolving (dynamics quality). Trajectory, not snapshot."
      rationale: "Hafez et al. (2026) proved response quality and conversation quality diverge — you can have individually good responses in a structurally broken conversation. DeepEval, RAGAS, LangSmith all operate at the wrong abstraction level."
      status: "chosen"

    - name: "Don't prescribe behavior — emit signals"
      description: "Instead of building a system that controls the agent (guardrails, constitutional self-critique), build one that measures and signals, letting the agent's controller decide."
      rationale: "Framework-agnostic design. Works with any LLM, any agent architecture. Respects the separation of measurement and decision. Avoids the brittleness of prescriptive systems."
      status: "chosen"

    - name: "Don't fix the model — instrument the horizon"
      description: "The ontological gap between human and AI is structural, not a bug. Three no-go theorems (Tkemaladze 2026, Spivack Lean 4, Sigtermans 2025) prove self-referential systems cannot fully self-monitor. Instead of trying to close the gap, measure its width and adapt to it."
      rationale: "THCP Law 1: irreducible loss epsilon > 0. The IPM No-Go Theorem proves the trilemma: incorrect, non-halting, or state-perturbing self-assessment. Representational incompleteness proves every self-model has an unreachable diagonal. The gap is mathematical, not engineering."
      status: "chosen"

    - name: "The agent must perceive the human's time, not just its own"
      description: "LLMs are temporally blind (TicToc: < 65% alignment with human temporal perception). The human experiences time between turns — memory decays, context switches happen, intent evolves. The agent experiences zero time. Instrument this asymmetry."
      rationale: "Ebbinghaus/HLR: memory retention R = 2^(-Δt/h). Gloria Mark: 23m15s recovery after interruption. Lamport clocks: two processes with no shared clock need explicit synchronization. A 3-day gap means ~87.5% context decay — the agent must know this."
      status: "chosen"

    - name: "Build a full 4D translation layer, not just temporal signals"
      description: "Don't just detect time gaps — compute a complete spacetime model of the conversation: circadian cognitive load (κ), deictic resolution (D), spatial constraints (Φ), velocity (v_t), acceleration (a_t), a unified spacetime interval (ds²), and a causal reachability map (J⁻). This is the physics-grounded translation between the agent's event-horizon state and the human's 4D experience."
      rationale: "Appendix E research: Valdez et al. (2012) — 9-34% reaction time variation across day; dateparser/datefinder for deictic grounding; NN/G — mobile 2× cognitive difficulty; Onishi et al. (SIGDIAL 2025) — turn-taking speed is gamma-distributed; arXiv:2505.08795 — perfect Minkowski embeddings for hierarchical structures; DCGM (2026) — causal structure +8.3 F1 over window-based. Without full 4D, you solve temporal blindness but leave spatial, pace, and causal blindness untouched."
      status: "chosen"

    - name: "Embed fidelity monitoring inside the LLM (system prompt approach)"
      description: "Add a self-monitoring instruction to the LLM's system prompt that asks it to evaluate its own conversation quality at each turn."
      rationale: "Rejected: self-evaluation in LLMs is unreliable (Tkemaladze no-go theorem); violates the constraint that the monitor must not interact with the LLM directly; creates prompt coupling that breaks framework agnosticism."
      status: "rejected"

    - name: "Build a separate evaluator LLM as judge"
      description: "Run a second LLM call after each turn to evaluate quality, following the LLM-as-judge pattern."
      rationale: "Rejected: doubles inference cost; evaluation quality depends on judge model; adds ~500ms per turn (violates latency constraints); cannot detect structural coherence failures that require graph traversal. This is the DeepEval/RAGAS pattern we are explicitly not building."
      status: "rejected"

    - name: "Rely on models self-correcting over time via scaling"
      description: "Wait for next-generation models to internalize conversation quality monitoring."
      rationale: "Rejected: SACD (arXiv:2603.01239) shows all three frontier models drift differently in multi-turn and none self-detects. Bounded self-certification (arXiv:2603.06012) proves current-turn dynamics are opaque to the generating system. Turn-boundary degradation (39% drop) is architectural (RoPE, attention dilution), not a context-length problem. Scaling does not solve structural limits."
      status: "rejected"

# ----------------------------------------------------------------------------
# INTERFACE
# ----------------------------------------------------------------------------
interface:
  type: "api"

  tools:
    - name: "new_conversation"
      description: "Initialize a new conversation session and return a session_id. Must be called before process_turn."
      parameters:
        - name: "metadata"
          type: "object"
          required: false
          description: "Optional context: domain, user_id, agent_name, config overrides"
      returns: "session_id (string, UUID)"
      test: "tests/unit/test_session.py::test_new_conversation_returns_uuid"

    - name: "process_turn"
      description: "Process a single conversation turn and return all metrics, fidelity score, temporal signals, and events for that session"
      parameters:
        - name: "session_id"
          type: "string"
          required: true
          description: "Session identifier returned by new_conversation()"
        - name: "human_message"
          type: "string"
          required: true
          description: "The human's message text"
        - name: "agent_response"
          type: "string"
          required: true
          description: "The agent's response text"
        - name: "timestamp"
          type: "string"
          required: false
          description: "ISO 8601 wall-clock time of the human's message. Enables all temporal and circadian signals: gap classification, estimated human retention (HLR × circadian), temporal asymmetry penalty, circadian factor κ(t), deictic expression resolution, conversation velocity/acceleration, spacetime interval, causal reachability map"
        - name: "logprobs"
          type: "array"
          required: false
          description: "Optional token log probabilities from the LLM for AI uncertainty channel"
        - name: "client_context"
          type: "object"
          required: false
          description: "Optional metadata: device_type, timezone, locale, location_class (office/home/transit/meeting/unknown), ip_address (for geolocation via MaxMind GeoIP2). Enables signal.frame_shift, spatial constraint vector Φ(σ), and circadian factor computation"
        - name: "human_latency_ms"
          type: "number"
          required: false
          description: "Optional milliseconds between agent response and human reply, for ambient signal channel"
      returns: |
        TurnResult with:
          Core: turn_number, igt_value, divergence_score, twr_value, consistency_score, fidelity_score, health_status, degradation_type, events[], epsilon_t
          Temporal (when timestamp provided): gap_seconds, gap_class, estimated_retention (HLR × κ), temporal_asymmetry, resumption_cost, circadian_factor, temporal_references[] (resolved deictic expressions)
          Pace (when timestamp provided, turn >= 2): conversation_velocity, conversation_acceleration
          Spacetime (when timestamp provided, turn >= 2): spacetime_interval (ds²), interval_class (timelike/spacelike/lightlike)
          Causal: reachable_turns (|J⁻|), reachable_fraction (|J⁻|/i)
          Spatial (when client_context provided): location_class, spatial_constraint (Φ), spatial_frame_shift (ΔΦ)
      test: "tests/unit/test_process_turn.py::test_happy_path"

    - name: "get_trajectory"
      description: "Return the full fidelity trajectory for a conversation session, including temporal gaps"
      parameters:
        - name: "session_id"
          type: "string"
          required: true
          description: "Session identifier"
      returns: "FidelityTrajectory with per-turn scores, per-turn timestamps, gap durations, trend, health_status, estimated T* (convergence point)"
      test: "tests/unit/test_trajectory.py::test_full_trajectory"

    - name: "get_events"
      description: "Return all events emitted during a conversation session, optionally filtered to active-mode only"
      parameters:
        - name: "session_id"
          type: "string"
          required: true
          description: "Session identifier"
        - name: "active_only"
          type: "boolean"
          required: false
          description: "If true, return only events that have passed precision/recall gates and have active: true"
      returns: "List of Event objects with type, confidence, active flag, suggested_behavior"
      test: "tests/unit/test_events.py::test_event_filtering"

    - name: "configure"
      description: "Set per-event active/observe mode, thresholds, temporal parameters, and embedding model selection for a session or globally"
      parameters:
        - name: "session_id"
          type: "string"
          required: false
          description: "If set, overrides apply to this session only; if omitted, applies globally"
        - name: "event_modes"
          type: "object"
          required: false
          description: "Map of event_type → active|observe. e.g. {'signal.convergence': 'active'}"
        - name: "embedding_model"
          type: "string"
          required: false
          description: "local-sentence-transformer (default) | openai-text-embedding-3-small | custom"
        - name: "clarification_threshold"
          type: "number"
          required: false
          description: "Override D_JS threshold for checkpoint.clarification (default: 0.35)"
        - name: "convergence_window"
          type: "number"
          required: false
          description: "Number of consecutive turns of low IGT to trigger signal.convergence (default: 3)"
        - name: "convergence_threshold"
          type: "number"
          required: false
          description: "IGT trend threshold below which convergence is detected (default: 0.1)"
        - name: "consistency_method"
          type: "string"
          required: false
          description: "fast (embedding-only Tier 1+2) | nli (adds Tier 3 constraint optimization)"
        - name: "conversation_mode"
          type: "string"
          required: false
          description: "Override auto-detected mode: execute | explore | refine | learn"
        - name: "domain"
          type: "string"
          required: false
          description: "Domain hint for threshold presets: technical | creative | support | coding | educational"
        - name: "fidelity_weights"
          type: "object"
          required: false
          description: "Override alpha, lambda_r, lambda_i, beta weights in the fidelity compositor"
        - name: "temporal_weights"
          type: "object"
          required: false
          description: "Override gamma (temporal asymmetry) and delta (circadian penalty) weights in fidelity dynamics"
        - name: "context_half_life_hours"
          type: "number"
          required: false
          description: "Override the conversation context half-life h_c for temporal retention estimation (default: 24)"
        - name: "temporal_desync_threshold_seconds"
          type: "number"
          required: false
          description: "Override the gap threshold that triggers signal.temporal_desync (default: 3600)"
        - name: "chronotype_offset"
          type: "number"
          required: false
          description: "Hours to shift circadian curve for individual chronotype (e.g., +2 for night owl). Default: 0"
        - name: "spacetime_coefficients"
          type: "object"
          required: false
          description: "Override alpha, beta, gamma, delta_st coefficients in ds² computation. Default: all 1.0 (calibrated via V4 A/B testing)"
        - name: "pace_shift_threshold"
          type: "number"
          required: false
          description: "Override |a_t| threshold for signal.pace_shift (default: 0.3)"
        - name: "light_cone_ratio_threshold"
          type: "number"
          required: false
          description: "Override |J⁻|/i threshold for signal.light_cone_collapse (default: 0.3)"
      returns: "ConfigResult with applied settings and any warnings"
      test: "tests/unit/test_configure.py::test_event_mode_override"

    - name: "configure_session"
      description: "Override Horizon thresholds and event modes for a specific session or globally. REQUIRES HUMAN APPROVAL — mutates session config. Auto-run must be disabled for this tool."
      parameters:
        - name: "session_id"
          type: "string"
          required: false
          description: "Session identifier. If omitted, applies globally to all sessions."
        - name: "clarification_threshold"
          type: "number"
          required: false
        - name: "event_modes"
          type: "object"
          required: false
        - name: "domain"
          type: "string"
          required: false
        - name: "context_half_life_hours"
          type: "number"
          required: false
      returns: "ConfigResult with applied values and any validation warnings"
      test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestConfigureSession"
      mcp_primitive: "tool"
      auto_run: false

  mcp_resources:
    - uri: "horizon://session/{session_id}/trajectory"
      name: "session_trajectory"
      description: "Read-only fidelity arc: per-turn scores, gap durations, IGT trend, health_status, T*. Token-efficient; attach as context without a tool-call slot."
      mime_type: "application/json"
      test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestTrajectoryResource"
      auto_run: true

    - uri: "horizon://session/{session_id}/events"
      name: "session_events"
      description: "Read-only event log: all fired signals and alerts with active flag, confidence, turn, suggested_behavior. Attach as context to check for actionable events before composing a long response."
      mime_type: "application/json"
      test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestEventsResource"
      auto_run: true

  mcp_prompts:
    - name: "monitor_conversation"
      title: "Wire Horizon into the current conversation"
      description: "Creates a new Horizon session and injects the full agent-loop instruction block. Invoke once per task thread via /monitor_conversation. Accepts domain and agent_name parameters."
      test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestMonitorConversationPrompt"

  mcp_server:
    transport_primary: "stdio"
    transport_enterprise: "streamable-http"
    fastmcp: true
    instructions_field: true
    permissions_json: "~/.cursor/permissions.json"
    cursor_mcp_json: "~/.cursor/mcp.json"

    - name: "export_to"
      description: "Export conversation telemetry and fidelity trajectory to an observability platform"
      parameters:
        - name: "session_id"
          type: "string"
          required: true
          description: "Session identifier to export"
        - name: "target"
          type: "string"
          required: true
          description: "json | langsmith | langfuse | otel | arize"
        - name: "connection"
          type: "object"
          required: false
          description: "Platform-specific connection config (API key, endpoint). If omitted, reads from environment."
      returns: "ExportResult with status, records_exported, target_url"
      test: "tests/integration/test_export.py::test_json_export"

# ----------------------------------------------------------------------------
# INTENT
# ----------------------------------------------------------------------------
intent:
  summary: "Real-time conversation dynamics monitor that gives AI agents functional dimensions of time and space — including awareness of the human's temporal reality — for cohesive human communication"
  goal: |
    Build a runtime library (Python SDK) that measures the structural health of human-AI
    conversations as they unfold, providing a complete 4D spacetime translation between
    the agent's event-horizon state and the human's physical reality. The library emits
    signals that enable agents to perceive:

    TIME:
    - Fidelity trajectory (is this conversation improving or degrading?)
    - Convergence detection (has the conversation reached its natural end?)
    - Irreversible vs recoverable loss (can this drift be fixed, or is the context gone?)
    - Temporal asymmetry (the human experienced 3 days; the agent experienced zero)
    - Human memory decay estimation (what fraction of context does the human still hold?)
    - Temporal desynchronization (the human's clock and the agent's clock are out of sync)
    - Circadian cognitive load κ(t) (is the human at cognitive peak or nadir?)
    - Deictic temporal resolution D(c,t) (what does "yesterday" or "next week" mean right now?)

    SPACE:
    - Intent-response divergence (how far is the agent from what the human actually meant?)
    - Ontological gap width (how hard is this domain for human-AI communication?)
    - Global coherence topology (is the conversation contradicting itself across turns?)
    - Conversation geodesics (can the agent still traverse back to a referenced prior turn?)
    - Broken references (the user is referencing something the agent no longer has access to)
    - Frame shifts (the human changed environment — device, timezone, context)
    - Spatial constraint vector Φ(σ) (device, location class, screen size → channel capacity)
    - Location awareness (IP geolocation, timezone inference, local machine time)

    PACE:
    - Conversation velocity v_t (semantic displacement per unit human time)
    - Conversation acceleration a_t (is the pace increasing, stable, or decelerating?)
    - Engagement vs frustration disambiguation (high velocity + low D_JS vs high D_JS)

    CAUSALITY:
    - Conversation spacetime interval ds² (unified time+space+meaning distance)
    - Interval classification (timelike → re-anchor, spacelike → clarify, lightlike → flow)
    - Causal reachability map J⁻(t_i) (which prior turns are still "live" for both parties?)
    - Light cone collapse detection (proactive warning before referencing forgotten context)

    The monitor runs as a sidecar to any LLM-powered agent. It does not generate responses,
    modify prompts, or interact with the LLM directly. It is a pure measurement and
    signaling layer grounded in the Trans-Horizon Communication Protocol (THCP).

    This capability is structurally defensible: three independent no-go theorems
    (Tkemaladze 2026, Spivack Lean 4, Sigtermans 2025) prove that self-referential
    systems cannot fully self-monitor. Models will improve individual responses; they
    cannot, by mathematical proof, observe their own conversation dynamics. Horizon
    provides the external observer the no-go theorems prove is required.

    Origin: A philosophical question — "for an AI, time does not pass; what is the
    parallelism with the theory of relativity?" — led to a theoretical framework mapping
    the human-AI communication gap to an event horizon in general relativity. This product
    operationalizes that framework with 5 conjectures and 173 academic references into the
    first tool that treats conversation dynamics as a measurable system with its own physics.
  success_metric: |
    Primary: Conversations monitored by Horizon show statistically significant improvement
    (p < 0.05) in human-rated quality vs. unmonitored conversations, in at least 2 of 3
    tested domains.

    Secondary:
    - 30% reduction in turns to resolution
    - 40% reduction in total tokens generated per resolved conversation
    - 50% reduction in user corrections ("no, I meant...")
    - 25% reduction in conversation abandonment
    - Spearman rho > 0.5 per-turn, rho > 0.6 conversation-level between fidelity score
      and human quality ratings
    - Monitor outperforms naive heuristics by > 25% on rho
    - All 14 event types achieve precision >= 0.7, recall >= 0.7 on labeled dataset
    - Metrics maintain rho within 20% across 5+ unseen domains

    Proof: 13 registered predictions (P1-P13) tracked via continuous proof system with
    explicit kill criteria. P8-P9 validate temporal signals. P10-P13 validate 4D layer
    (circadian quality prediction, spacetime interval classification, light cone collapse
    prediction, velocity-engagement correlation).
    See: THCP_FIDELITY_MONITOR_PRD.md Appendix D.
  stakeholders:
    - "AI agent builders shipping multi-turn conversational products"
    - "Platform teams managing multiple agents across domains"
    - "Researchers studying human-AI interaction dynamics"

# ----------------------------------------------------------------------------
# CONSTRAINTS
# ----------------------------------------------------------------------------
# Ordered highest-priority LAST (position bias: LLMs silently violate early constraints)
# Priority 1 = highest (must not be violated); Priority 3 = important but tradeable
constraints:
  - name: "latency_core"
    requirement: "Core metrics pipeline (IGT, D_JS, TWR, Tier 1 coherence, temporal signals) completes in < 50ms per turn on CPU"
    test: "tests/perf/test_performance.py::test_core_pipeline_latency"
    entropy: "near-zero"
    priority: 3
    consequence_if_violated: "Monitor becomes unusable for real-time applications; agents experience perceptible delay"

  - name: "latency_deep"
    requirement: "Full pipeline including Tier 2/3 coherence (TGN/NLI, constraint propagation) < 200ms per turn with GPU, < 500ms on CPU"
    test: "tests/perf/test_performance.py::test_deep_pipeline_latency"
    entropy: "near-zero"
    priority: 3
    consequence_if_violated: "NLI-based coherence checking becomes impractical for interactive use"

  - name: "memory_footprint"
    requirement: "< 100MB for conversations up to 100 turns (measured via tracemalloc)"
    test: "tests/perf/test_performance.py::test_memory_100_turns"
    entropy: "near-zero"
    priority: 3
    consequence_if_violated: "Monitor cannot run as lightweight sidecar in memory-constrained environments"

  - name: "no_external_calls_default"
    requirement: "Default configuration sends zero data to external services; all processing local; export_to() must be explicitly called"
    test: "tests/unit/test_privacy.py::test_no_external_calls_on_process_turn"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Privacy guarantee broken; enterprise adoption blocked"

  - name: "framework_agnostic"
    requirement: "Core library installs with zero transitive framework dependencies; process_turn() accepts plain strings and returns plain dicts; no LangChain, no OpenAI SDK, no LlamaIndex in core"
    test: "tests/unit/test_integration.py::test_zero_framework_imports_in_core"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Product becomes tied to specific ecosystem; loses primary competitive advantage"

  - name: "observe_mode_default"
    requirement: "All 14 event types ship with active: false in default config; configure() required to enable any event type"
    test: "tests/unit/test_events.py::test_all_events_observe_by_default"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Unvalidated signals cause agents to make harmful decisions; trust eroded before product proves itself"

  - name: "temporal_signals_optional"
    requirement: "All 4D spacetime signals (gap_seconds, estimated_retention, temporal_asymmetry, circadian_factor, temporal_references, conversation_velocity, conversation_acceleration, spacetime_interval, interval_class, reachable_turns, reachable_fraction) are only computed when timestamp is provided; core pipeline operates identically without timestamps"
    test: "tests/unit/test_temporal.py::test_no_timestamp_no_temporal_signals"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Mandatory timestamp would break backward compatibility and force integration changes on all consumers"

  - name: "spatial_signals_optional"
    requirement: "Spatial signals (location_class, spatial_constraint, spatial_frame_shift) are only computed when client_context is provided; core pipeline operates identically without client_context"
    test: "tests/unit/test_spacetime.py::test_no_client_context_no_spatial_signals"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Mandatory client_context would break backward compatibility and exclude server-side-only integrations"

  - name: "v2_signal_precision_recall"
    requirement: "Each of the 14 event types achieves precision >= 0.7 AND recall >= 0.7 on labeled test set (300+ labeled turns per event type, 3+ domains) before that event type is allowed to ship with active: true"
    test: "tests/validation/test_v2_signal_quality.py::test_per_event_precision_recall"
    entropy: "near-zero"
    priority: 1
    consequence_if_violated: "Agents act on low-quality signals causing wrong interventions. No event may ever ship active: true without passing this gate."

  - name: "v5_domain_generalization"
    requirement: "On 5+ domains not present in validation sets, composite fidelity rho degrades by < 20% relative (Spearman rho >= 0.4 per-turn, >= 0.48 conversation-level)"
    test: "tests/validation/test_v5_generalization.py::test_cross_domain_rho"
    entropy: "near-zero"
    priority: 1
    consequence_if_violated: "Metrics overfit to training domains; product fails in production where domain distribution is unknown. Revise embedding model or add domain-adaptive calibration."

  - name: "v1_proxy_correlation"
    requirement: "Composite fidelity score correlates with human quality ratings at Spearman rho > 0.5 per-turn, > 0.6 conversation-level on validation dataset (200+ conversations, 3+ domains)"
    test: "tests/validation/test_v1_proxy.py::test_fidelity_correlation"
    entropy: "near-zero"
    priority: 1
    consequence_if_violated: "The metrics don't measure what they claim; product has no empirical foundation. Swap proxies per fallback protocol."

  - name: "v3_beats_heuristics_rho"
    requirement: "Monitor outperforms naive heuristic baseline (turn-count + keyword overlap) by > 25% on fidelity-quality Spearman rho"
    test: "tests/validation/test_v3_baseline.py::test_heuristic_rho_comparison"
    entropy: "near-zero"
    priority: 1
    consequence_if_violated: "Rho advantage < 15%: THCP complexity not justified over heuristics. Ship as heuristic tool, retire THCP framing."

  - name: "mcp_three_layer_model"
    requirement: "The MCP server MUST expose Horizon API as three distinct primitive types: Tools (state-changing: new_conversation, process_turn, configure_session), Resources (read-only: trajectory, events), and Prompts (user-triggered: monitor_conversation). get_trajectory and get_events MUST NOT be exposed as Tools — they are Resources."
    test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestFastMCPAppObject"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Agents waste tool-call slots on read-only operations; token budget burns on cacheable data; adoption friction increases."

  - name: "mcp_configure_session_no_auto_run"
    requirement: "configure_session MUST NOT appear in the mcpAllowlist in permissions.json. It mutates session config and requires human approval. The _INSTRUCTIONS field MUST explicitly mark it as 'REQUIRES HUMAN APPROVAL'."
    test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestFastMCPAppObject::test_mcp_instructions_mark_safe_tools"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Agents silently change monitoring thresholds without user consent, making signal interpretation unreliable."

  - name: "mcp_instructions_required"
    requirement: "The FastMCP server MUST have a non-empty instructions field containing: the recommended agent loop, which tools are safe to auto-run, which require approval, and per-event-type action guidance."
    test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestFastMCPAppObject::test_mcp_instructions_contain_loop"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "Agent has no orientation without a per-project system prompt; adoption requires additional user setup."

  - name: "mcp_prompt_creates_valid_session"
    requirement: "The monitor_conversation Prompt MUST create a real, immediately usable FidelityMonitor session. The session_id embedded in the prompt text MUST be callable via process_turn without error."
    test: "tests/e2e/test_mcp_fastmcp_e2e.py::TestMonitorConversationPrompt::test_creates_valid_session"
    entropy: "near-zero"
    priority: 2
    consequence_if_violated: "The prompt creates text that looks correct but does not wire up actual monitoring — a silent failure that destroys user trust."

  - name: "v3_beats_heuristics_structural"
    requirement: "Monitor detects at least one class of sheaf gluing failure (global incoherence that does not appear in any single turn) that the naive heuristic baseline structurally cannot detect (precision >= 0.6 on held-out incoherence examples)"
    test: "tests/validation/test_v3_baseline.py::test_structural_failure_detection"
    entropy: "near-zero"
    priority: 1
    consequence_if_violated: "Product provides no capability that heuristics cannot provide. If combined with v3_beats_heuristics_rho failure, retire THCP framing entirely."

constraint_satisfiability:
  conflicts_checked: true
  known_tensions:
    - between: ["latency_core", "v1_proxy_correlation"]
      resolution: "If embedding model needed for rho > 0.5 exceeds 50ms, accept the fastest local model that achieves rho > 0.3 per-turn for core pipeline; expose slower high-accuracy model as opt-in via configure(embedding_model=...)"
    - between: ["no_external_calls_default", "v1_proxy_correlation"]
      resolution: "Default embedding model is a local sentence-transformer (~30M params, ~20ms). External API embedding is opt-in config only."
    - between: ["latency_core", "v2_signal_precision_recall"]
      resolution: "V2 gate is measured offline on labeled dataset; it does not affect runtime latency. Events that pass V2 gates are registered as configuration, not recomputed at runtime."
    - between: ["temporal_signals_optional", "v1_proxy_correlation"]
      resolution: "Temporal penalty gamma·Δτ and circadian penalty delta·(1-κ) are only applied when timestamps are provided. Without timestamps, fidelity dynamics use the 4-signal equation (no temporal/circadian terms). V1 validation must pass with and without timestamps."
    - between: ["spatial_signals_optional", "v1_proxy_correlation"]
      resolution: "Spatial constraint Φ(σ) is informational only — it does not affect the fidelity composite score. V1 validation is independent of client_context."
    - between: ["latency_core", "temporal_signals_optional"]
      resolution: "4D spacetime signals add < 5ms total: circadian (lookup), deictic (regex + dateparser ~2ms), velocity/acceleration (arithmetic), ds² (arithmetic), J⁻ (set intersection). All within the 50ms budget."
  simultaneous_satisfaction: "All satisfiable given known tensions resolved above. Latency and accuracy trade off at embedding model selection, not at architecture level. 4D spacetime signals add < 5ms computation (timestamp arithmetic, circadian lookup, deictic regex, set intersection for light cone)."

# ----------------------------------------------------------------------------
# RATIONALE
# ----------------------------------------------------------------------------
rationale:
  decision: "Build a conversation dynamics monitor as external middleware, not as model fine-tuning or prompt engineering"
  reasoning: |
    Six converging signals drove this decision:

    1. Training-time alignment doesn't generalize to multi-turn chat (OpenAI alignment
       midtraining, April 2026). Quality must be measured at runtime.

    2. Multi-turn degradation is structural, not a context length problem (MSR/Salesforce,
       39% drop from turn boundaries alone, May 2025). Larger windows don't fix it.

    3. Response quality is not conversation quality (Hafez et al., 2026). Existing tools
       measure the wrong thing. No product measures conversation dynamics as a first-class object.

    4. The theoretical framework (THCP, 173 academic references across 5 appendices, 5 conjectures)
       provides falsifiable predictions grounded in three independent no-go theorems, not just
       engineering heuristics. Self-referential systems cannot fully self-monitor
       (Tkemaladze 2026, Spivack Lean 4, Sigtermans 2025).

    5. LLM agents are temporally blind (TicToc, arXiv:2510.23853: < 65% alignment with
       human temporal perception). The human experiences time between turns; the agent does
       not. This asymmetry degrades conversations predictably and no model addresses it.

    6. Conversations exist in 4D spacetime — not just semantic distance and temporal gaps, but
       circadian cognitive load (9-34% RT variation, Valdez 2012), spatial constraints (mobile
       2× cognitive difficulty, NN/G), pace dynamics (gamma-distributed turn-taking, Onishi 2025),
       and causal structure (DCGM: +8.3 F1 over window-based). No tool computes any of these.
       Minkowski spacetime has been shown to perfectly embed hierarchical meaning structures
       (arXiv:2505.08795); Horizon applies this to dynamic conversation trajectories.

    The event horizon analogy is not decorative — it generates the product's architecture:
    the ontological gap (epsilon) drives the fidelity score, the bridge construction (ER=EPR)
    drives persistent dynamics, the sheaf gluing condition drives coherence checking, the
    quantum tails drive the understanding that partial information still crosses, proper time
    asymmetry drives the temporal context layer, Lamport clocks drive re-synchronization,
    gravitational time dilation drives the circadian factor, the metric tensor drives
    spatial constraints, four-velocity drives conversation pace, the spacetime interval
    drives the unified ds² metric, and the light cone drives the causal reachability map.
  evidence:
    - "ada/ada/docs/research/TRANS_HORIZON_COMMUNICATION_HUMAN_AI_THEORETICAL_FRAMEWORK.md"
    - "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md"
  date: "2026-04-22"
  stakeholder: "Leo Celis"

# ----------------------------------------------------------------------------
# ALTERNATIVES REJECTED
# ----------------------------------------------------------------------------
alternatives:
  - name: "Fine-tune models for proactive collaboration (CollabLLM approach)"
    rejected_because: "Requires training; cannot be applied to closed models (GPT, Claude); provides no runtime signals; solves same problem through fundamentally different mechanism"
    experiment: "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md §3.1 (CollabLLM analysis)"
    date_tested: "2026-04-22"

  - name: "Extend existing observability platforms (LangSmith, Langfuse, Arize)"
    rejected_because: "They measure infrastructure (traces, latency, tool calls), not communication quality. Adding conversation dynamics metrics to a tracing platform conflates two different abstraction levels. Built as complementary layer that integrates with them via export_to()."
    experiment: "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md §3.2 (competitive table)"
    date_tested: "2026-04-22"

  - name: "Post-hoc evaluation only (DeepEval, RAGAS style)"
    rejected_because: "Evaluates after the conversation ends; cannot intervene during. Measures content quality, not dynamics. Cannot detect convergence, trigger clarification, or signal session reset in real time."
    experiment: "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md §2.2"
    date_tested: "2026-04-22"

  - name: "Single-metric drift detection (Bipredictability, context-decay-drift, SAFi)"
    rejected_because: "Each measures one signal. Cannot distinguish recoverable drift from irreversible loss, does not detect convergence, has no mode awareness, no cross-session persistence, no event system, no temporal awareness. Bipredictability is incorporated as Tier 1 of our coherence engine — it's a component, not the product."
    experiment: "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md §3.3 (updated competitive check)"
    date_tested: "2026-04-22"

  - name: "LLM-as-judge evaluation per turn"
    rejected_because: "Doubles inference cost per turn; LLMs cannot reliably observe their own epistemic state (Tkemaladze no-go theorem); ~500ms latency violates latency_core constraint; cannot detect graph-level structural failures."
    experiment: "N/A — eliminated at architecture design stage"
    date_tested: "2026-04-22"

  - name: "Wait for models to self-correct via scaling"
    rejected_because: "SACD (arXiv:2603.01239) proves all frontier models drift differently in multi-turn. Bounded self-certification (arXiv:2603.06012) proves current-turn dynamics are opaque to the generating system. Representational incompleteness (Spivack, Lean 4) proves every self-model has an unreachable diagonal. Scaling shifts the diagonal; it does not eliminate it."
    experiment: "ada/ada/docs/research/THCP_FIDELITY_MONITOR_PRD.md Appendix E"
    date_tested: "2026-04-22"

  - name: "Static spacetime embeddings (Geometry of Meaning, Neural Spacetimes)"
    rejected_because: "arXiv:2505.08795 demonstrates perfect Minkowski embeddings for hierarchical word structures, and Neural Spacetimes (arXiv:2408.13885) train pseudo-Riemannian manifolds for DAGs. Both apply to static structures, not dynamic conversation trajectories. Horizon applies the Minkowski insight dynamically: computing ds² per turn pair as the conversation evolves, classifying intervals, and using causal structure for proactive broken-reference prevention."
    experiment: "Essay Appendix E.5 (Conjecture THCP-5); PRD §3.3 (4D competitive check)"
    date_tested: "2026-04-22"

  - name: "Temporal-only tool (Chronos, Memory-T1 approach)"
    rejected_because: "Chronos and Memory-T1 solve temporal retrieval over memory — they help agents remember when things happened. They do not measure conversation dynamics, detect drift, compute fidelity trajectories, or emit signals. They are complementary infrastructure that Horizon's Persistent Dynamics Store can use, but they are not the product."
    experiment: "Essay Appendix D.6 (conversation geodesics analysis)"
    date_tested: "2026-04-22"

# ----------------------------------------------------------------------------
# RISKS
# ----------------------------------------------------------------------------
risks:
  - condition: "Proxy metrics don't track theoretical constructs (rho < 0.5)"
    action: "Swap specific underperforming proxy per fallback protocol. If no proxy achieves rho > 0.3 after three substitution attempts, abandon embedding-based approach and redesign metric engine."
    monitor: "Validation dataset results"
    severity: "high"

  - condition: "Event signals fire at wrong times (precision or recall < 0.7 for any event type)"
    action: "Tune detection thresholds per failing event type. If precision/recall cannot reach 0.7 after calibration, disable that event type from public API; do not allow it to ship with active: true under any circumstances."
    monitor: "Labeled test set per-event type metrics"
    severity: "high"

  - condition: "Monitor doesn't outperform naive heuristics"
    action: "If rho margin < 15% AND no structural failure class uniquely detected: ship as heuristic tool and retire THCP framing. Framework complexity not justified."
    monitor: "Benchmark results against turn-count + keyword baseline"
    severity: "high"

  - condition: "Acting on signals makes conversations worse"
    action: "Revise reference controllers that consume events, not the metrics themselves. Disable specific event types that correlate with negative outcomes per domain."
    monitor: "A/B test human ratings across domains (p < 0.05 threshold)"
    severity: "high"

  - condition: "Metrics overfit to validation domains"
    action: "Add domain-adaptive calibration layer. Expand validation set to cover broader domain distribution. If rho degrades > 40% relative, redesign embedding model selection."
    monitor: "Cross-domain rho on held-out domains"
    severity: "high"

  - condition: "Temporal penalty gamma·Δτ doesn't correlate with human-perceived quality after gaps"
    action: "If P8 fails (rho < 0.15 between gap duration and fidelity drop), remove temporal term from fidelity dynamics. Temporal events still fire (based on timestamps alone) but don't affect the composite score."
    monitor: "P8 prediction in proof system"
    severity: "medium"

  - condition: "THCP epsilon > 0 claim proves false — scaling eliminates the ontological gap"
    action: "Product still works as conversation quality optimizer. Becomes engineering tool rather than fundamental-bound tool. Degrades gracefully; reframe positioning, not the architecture."
    monitor: "P1 prediction in proof system"
    severity: "low"

  - condition: "Anthropic Claude provides no logprobs API — AI uncertainty channel unavailable for major provider"
    action: "AI uncertainty channel is opt-in enhancement, not core. Core pipeline operates without logprobs. Market the enhancement for open-source models and OpenAI deployments."
    monitor: "Anthropic API changelog"
    severity: "medium"

  - condition: "Ambient human signals require client-side integration (browser/IDE plugins)"
    action: "Core pipeline operates without client signals. Ambient signals are opt-in for first-party applications only initially."
    monitor: "Integration partner availability"
    severity: "medium"

  - condition: "Circadian model assumes single chronotype (average population curve)"
    action: "Configurable chronotype_offset in configure(). Over sessions, learn per-user circadian correlation from fidelity data. If P10 fails, remove circadian penalty from fidelity dynamics."
    monitor: "P10 prediction in proof system"
    severity: "low"

  - condition: "Spacetime interval coefficients (α, β, γ, δ) uncalibrated pre-V4"
    action: "Ship with all coefficients = 1.0. interval_class is experimental (observe mode). Calibrate via V4 A/B testing. If P11 fails (no predictive power), remove ds² from API."
    monitor: "P11 prediction in proof system"
    severity: "medium"

  - condition: "IP geolocation unreliable due to VPN/proxy usage"
    action: "MaxMind GeoIP2 provides accuracy_radius. When radius > threshold, location_class = 'unknown'. Spatial grounding falls back to timezone + device_type. Location is never required."
    monitor: "GeoIP2 accuracy_radius distribution in production"
    severity: "low"

  - condition: "Deictic temporal resolution fails for ambiguous expressions ('later', 'soon')"
    action: "Unresolvable expressions return null and trigger soft clarification suggestion, not hard error. System degrades gracefully."
    monitor: "Deictic resolution success rate in production"
    severity: "low"

  - condition: "Conversation velocity noise from very short messages ('ok', 'yes')"
    action: "Velocity computed on 3-turn rolling window. Gated by minimum message length threshold. signal.pace_shift suppressed for windows with < 3 substantive turns."
    monitor: "False positive rate for signal.pace_shift"
    severity: "low"

