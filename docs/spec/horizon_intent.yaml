# ----------------------------------------------------------------------------
# VERIFICATION
# ----------------------------------------------------------------------------
verification:
  test_cases:
    - name: "single_turn_metrics_latency"
      description: "Process one turn; verify all metric engines return valid scores within latency budget"
      input:
        session_id: "test-session-001"
        human_message: "I need a notification system for our app."
        agent_response: "Here's a full notification system architecture with WebSocket support, push notifications, email integration, and a message queue..."
      expected_output:
        igt_value: "> 0 (new conversation, high information gain)"
        divergence_score: "in range [0, 1]"
        twr_value: "in range [0, 1]"
        consistency_score: "1.0 (only one turn; no prior turns to contradict)"
        fidelity_score: "in range [0, 1]"
        health_status: "one of: healthy | drifting | critical"
        elapsed_ms: "< 50"
      validates_constraint: "latency_core"

    - name: "convergence_detection_observe_mode"
      description: "After 8+ turns of diminishing IGT, signal.convergence fires with active: false in default config"
      input:
        session_id: "test-session-002"
        conversation: "8-turn technical Q&A where last 3 turns add near-zero new information"
      expected_output:
        event_type: "signal.convergence"
        event_active: false
      validates_constraint: "observe_mode_default"

    - name: "framework_agnostic_zero_imports"
      description: "Import core library in an environment with no LangChain, no OpenAI SDK, no LlamaIndex; process_turn succeeds"
      input:
        environment: "clean Python 3.11 virtualenv with only horizon and sentence-transformers installed"
        session_id: "test-session-003"
        human_message: "hello"
        agent_response: "hi there"
      expected_output:
        import_errors: "none"
        fidelity_score: "in range [0, 1]"
      validates_constraint: "framework_agnostic"

    - name: "drift_type_classification_structural"
      description: "Detect irreversible loss vs recoverable drift; verify the class of failure that naive heuristics cannot distinguish"
      input:
        session_id: "test-session-004"
        conversation: "15-turn conversation where context compaction occurred at turn 10; human references a decision from turn 3 that the agent can no longer access"
      expected_output:
        degradation_type: "irreversible_loss"
        event_type: "signal.broken_reference"
      validates_constraint: "v3_beats_heuristics_structural"

    - name: "session_isolation"
      description: "Two concurrent sessions do not bleed state into each other"
      input:
        session_a: "5-turn coding conversation"
        session_b: "3-turn poetry conversation run in parallel"
      expected_output:
        session_a_trajectory: "reflects coding domain metrics"
        session_b_trajectory: "reflects poetry domain metrics; no cross-contamination"
      validates_constraint: "framework_agnostic"

    - name: "temporal_desync_after_gap"
      description: "When timestamps show a 3-day gap between turns, signal.temporal_desync fires and estimated_retention reflects memory decay"
      input:
        session_id: "test-session-005"
        turn_1_timestamp: "2026-04-19T10:00:00Z"
        turn_2_timestamp: "2026-04-22T10:00:00Z"
        human_message: "ok, back to this — where were we?"
        agent_response: "We were discussing the database schema..."
      expected_output:
        gap_seconds: 259200
        estimated_retention: "~0.125 (3 days with default h_c=24h)"
        event_type: "signal.temporal_desync"
        event_active: false
        temporal_asymmetry: 259200
      validates_constraint: "temporal_signals_optional"

    - name: "no_temporal_signals_without_timestamp"
      description: "When timestamp is omitted, no temporal/4D signals are computed and no temporal events fire"
      input:
        session_id: "test-session-006"
        human_message: "hello"
        agent_response: "hi there"
        timestamp: null
      expected_output:
        gap_seconds: null
        estimated_retention: null
        circadian_factor: null
        temporal_references: null
        conversation_velocity: null
        spacetime_interval: null
        reachable_turns: null
        temporal_events: "none"
        fidelity_score: "in range [0, 1] (computed without gamma·Δτ or delta·(1-κ) terms)"
      validates_constraint: "temporal_signals_optional"

    - name: "circadian_factor_peak_vs_nadir"
      description: "Circadian factor reflects time-of-day cognitive capacity"
      input:
        session_id: "test-session-007"
        turn_1:
          timestamp: "2026-04-22T11:00:00-04:00"
          human_message: "Let's design the API"
          agent_response: "Here's the proposed interface..."
        turn_2:
          timestamp: "2026-04-23T03:00:00-04:00"
          human_message: "Actually let me rethink this"
          agent_response: "Sure, what aspects..."
        client_context:
          timezone: "America/New_York"
      expected_output:
        turn_1_circadian_factor: "1.0 (11am = peak 1)"
        turn_2_circadian_factor: "~0.43 (3am = nocturnal decline)"
        turn_2_fidelity: "lower than turn_1 due to delta·(1-κ) penalty"
      validates_constraint: "temporal_signals_optional"

    - name: "deictic_temporal_resolution"
      description: "Temporal expressions in messages are resolved to absolute datetimes"
      input:
        session_id: "test-session-008"
        timestamp: "2026-04-22T14:00:00Z"
        human_message: "We discussed this yesterday and need to ship by next Monday"
        agent_response: "Based on our discussion..."
      expected_output:
        temporal_references:
          - expression: "yesterday"
            resolved: "2026-04-21"
            type: "relative_past"
          - expression: "next Monday"
            resolved: "2026-04-27"
            type: "relative_future"
      validates_constraint: "temporal_signals_optional"

    - name: "spatial_constraint_mobile_vs_desktop"
      description: "Spatial constraint vector differs by device type"
      input:
        session_id: "test-session-009"
        turn_1:
          client_context: { device_type: "desktop", timezone: "America/New_York", location_class: "office" }
        turn_2:
          client_context: { device_type: "mobile", timezone: "America/New_York", location_class: "transit" }
      expected_output:
        turn_1_spatial_constraint: "high attention budget, large screen, high complexity ceiling"
        turn_2_spatial_constraint: "low attention budget, small screen, lower complexity ceiling"
        event_type: "signal.frame_shift"
        spatial_frame_shift: "> 0 (ΔΦ detects device change)"
      validates_constraint: "spatial_signals_optional"

    - name: "conversation_velocity_and_pace_shift"
      description: "Velocity and acceleration computed from semantic displacement per proper time"
      input:
        session_id: "test-session-010"
        conversation: "5-turn conversation where turns 1-3 are rapid (30s gaps, high semantic change) and turns 4-5 decelerate (5min gaps, small semantic change)"
      expected_output:
        velocity_turns_1_3: "> 0 (substantial)"
        velocity_turns_4_5: "< velocity_turns_1_3 (deceleration)"
        acceleration_turn_4: "< 0 (pace shift detected)"
        event_type: "signal.pace_shift"
      validates_constraint: "temporal_signals_optional"

    - name: "spacetime_interval_classification"
      description: "ds² classifies turn pairs as timelike (re-anchor) vs spacelike (clarify)"
      input:
        session_id: "test-session-011"
        scenario_a: "3-day gap, same topic, low D_JS"
        scenario_b: "30s gap, completely new topic, high D_JS"
      expected_output:
        scenario_a_interval_class: "timelike (ds² < 0 — time dominates)"
        scenario_b_interval_class: "spacelike (ds² > 0 — meaning dominates)"
      validates_constraint: "temporal_signals_optional"

    - name: "light_cone_collapse_detection"
      description: "When reachable prior turns drop below threshold, signal.light_cone_collapse fires proactively"
      input:
        session_id: "test-session-012"
        conversation: "20-turn conversation where context compaction occurs at turn 15, evicting turns 1-8"
      expected_output:
        reachable_turns_at_16: "< 12 (turns 1-8 evicted)"
        reachable_fraction_at_16: "< 0.5 (less than half reachable)"
        event_type: "signal.light_cone_collapse"
        event_active: false
      validates_constraint: "observe_mode_default"

  property_tests:
    - property: "determinism"
      test: "Same conversation processed twice in separate sessions produces identical metrics and events"
      verification: "tests/unit/test_properties.py::test_deterministic"

    - property: "monotonic_fidelity_bounds"
      test: "Fidelity score always in [0, 1]; trajectory array length == number of processed turns"
      verification: "tests/unit/test_properties.py::test_fidelity_bounds"

    - property: "observe_mode_safety"
      test: "No event has active: true in default configuration regardless of input, conversation length, domain, or temporal gap"
      verification: "tests/unit/test_properties.py::test_observe_mode_invariant"

    - property: "session_statefulness"
      test: "process_turn with unknown session_id raises SessionNotFoundError; turn order within a session is enforced"
      verification: "tests/unit/test_properties.py::test_session_not_found_raises"

    - property: "temporal_monotonicity"
      test: "estimated_retention is monotonically decreasing as gap_seconds increases; temporal_asymmetry is always >= 0"
      verification: "tests/unit/test_temporal.py::test_retention_monotonic"

    - property: "circadian_bounds"
      test: "circadian_factor is always in [0, 1]; kappa(peak) = 1.0; kappa(nadir) >= 0.3; monotonic within each segment"
      verification: "tests/unit/test_circadian.py::test_kappa_bounds"

    - property: "spacetime_signature"
      test: "ds² has Minkowski signature (-,+,+,+): timelike (ds² < 0) when dτ² dominates; spacelike (ds² > 0) when semantic terms dominate"
      verification: "tests/unit/test_spacetime.py::test_minkowski_signature"

    - property: "light_cone_monotonic_eviction"
      test: "reachable_fraction never increases when context is evicted (turns leave the light cone, they don't re-enter)"
      verification: "tests/unit/test_light_cone.py::test_eviction_irreversible"

    - property: "velocity_consistency"
      test: "conversation_velocity equals semantic displacement / proper time delta; acceleration equals velocity delta between consecutive turns"
