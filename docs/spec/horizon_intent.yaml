  - version: 5
    date: "2026-05-06"
    change: |
      FastMCP integration layer — full MCP server rebuild following spec best practices:
      - Migrated mcp/server.py from low-level mcp.server.Server to mcp.server.fastmcp.FastMCP
        (available natively in mcp>=1.13; no new dependency).
      - Added server-level `instructions` field describing the recommended agent loop, safe
        auto-run tools, and approval-required tools. Cursor/Claude Desktop surface this to
        the model automatically — no per-project system prompt required.
      - Redesigned all tool descriptions following Anthropic's agent-oriented guide:
        primary use case, preconditions, steer-to-alternatives. Example accuracy improvements
        from 72%→90% via 1-5 examples and negative guidance now applied to every tool.
      - get_trajectory and get_events promoted from Tools to MCP Resources at URIs
        horizon://session/{id}/trajectory and horizon://session/{id}/events. Resources are
        passive, cacheable, and token-efficient — agents attach them as context without
        spending a tool-call slot.
      - Added monitor_conversation Prompt (user-triggered, /monitor_conversation slash command).
        Creates a new session, generates the full agent-loop injection block, and wires the
        monitoring loop via a single user action. Accepts domain and agent_name parameters.
      - configure() MCP tool renamed to configure_session for clarity; explicitly marked
        REQUIRES HUMAN APPROVAL in instructions and description.
      - Registered horizon in ~/.cursor/mcp.json using python -m horizon.mcp.server pattern
        (more portable than the 'horizon serve' entry point which requires PATH install).
      - Shipped ~/.cursor/permissions.json with mcpAllowlist for new_conversation and
        process_turn (auto-run without approval); configure_session excluded.
      - Updated docs/integrations/CURSOR.md with full installation guide, three usage
        patterns (system prompt / on-demand prompt / workspace rule), permissions.json
        snippet, troubleshooting table, and enterprise/multi-user (Streamable HTTP) section.
      - Added tests/e2e/test_mcp_fastmcp_e2e.py: 40+ assertions across all three MCP
        primitive layers (tools, resources, prompt), full agent-loop integration test,
        _dispatch shim backward-compat tests, FastMCP app-object assertions.
      - Preserved _dispatch shim for backward compatibility with test_mcp_server_e2e.py.
      - cli.py updated to use FastMCP .run() for all three transports (stdio, sse,
        streamable-http) and to preload the embedding model on startup.
    reason: |
      Post-v0.2.0 audit identified MCP as the highest-leverage integration surface for
      enterprise Cursor/Claude Desktop adoption. Research (Cursor docs, MCP spec, Anthropic
      tool-writing guide) showed that: (a) thin tool descriptions cause agents to skip tools
      that are available; (b) treating get_trajectory/get_events as Tools wastes tool-call
      slots that should be spent on actions; (c) no Prompt means the agent has no one-click
      path to start monitoring; (d) no permissions.json means every process_turn call
      interrupts the user for approval. All four gaps closed in this revision.
    evidence:
      - "docs/integrations/CURSOR.md (updated integration guide)"
      - "tests/e2e/test_mcp_fastmcp_e2e.py (40+ e2e assertions)"
      - "~/.cursor/mcp.json (horizon server registered)"
      - "~/.cursor/permissions.json (auto-run allowlist)"

